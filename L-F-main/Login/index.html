<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="window flex center">
        <div class="login-container flex-column align-center">
            
            <!-- Illustration Area -->
            <div class="robot-section">
                <!-- Verbatim reference to provided image style -->
                <div class="robot-circle">
                    <div class="robot-head">
                        <div class="eyes"></div>
                        <div class="smile"></div>
                    </div>
                </div>
            </div>

            <!-- Login Card -->
            <div class="form-body color1 border-radius shadow">
                <div class="input-group">
                    <label>Email</label>
                    <input type="text" placeholder="Value" class="form-input">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Value" class="form-input">
                </div>

                <button class="signin-btn white-text" onclick="location.href='../DashBoard/index.html'">Sign In</button>

                <div class="form-footer">
                    <a href="../Forgot Password/index.html" class="forgot-text">Forgot password?</a>
                    <a href="../Register-or-SignUp/index.html" class="forgot-text signup-link">Create account</a>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
