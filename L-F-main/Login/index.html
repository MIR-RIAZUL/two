<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="window flex center">
        <div class="login-container flex-column align-center">
            
            <!-- Illustration Area -->
            <div class="robot-section">
                <!-- Verbatim reference to provided image style -->
                <div class="robot-circle">
                    <div class="robot-head">
                        <div class="eyes"></div>
                        <div class="smile"></div>
                    </div>
                </div>
            </div>

            <!-- Login Card -->
            <div class="form-body color1 border-radius shadow">
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" placeholder="your@email.com" class="form-input" required>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Your password" class="form-input" required>
                    </div>

                    <button type="submit" class="signin-btn white-text">Sign In</button>

                    <div class="form-footer">
                        <a href="../Forgot Password/index.html" class="forgot-text">Forgot password?</a>
                        <a href="../Register-or-SignUp/index.html" class="forgot-text signup-link">Create account</a>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="../app.js"></script>
</body>

</html>
