<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - PRODASH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="window flex">
        <!-- SIDEBAR -->
        <aside class="sidebar color3 white-text flex-column">
            <div class="padding">
                <div class="logo">Lost & Found</div>
                <nav class="nav-menu flex-column gap-15">
                    <div class="nav-item">Dashboard</div>
                    <div class="nav-item active">Verification</div>
                </nav>
            </div>
        </aside>

        <!-- MAIN BODY -->
        <main class="main-body color2 flex center">
            <!-- OTP PORTRAIT CONTAINER -->
            <div class="portrait-container">
                <h1 class="form-title">Verification</h1>
                
                <div class="form-card color1 border-radius shadow">
                    <div class="icon-header">📩</div>
                    <p class="instruction-text">We've sent a 4-digit code to your email. Please enter it below to verify your account.</p>
                    
                    <!-- OTP Input Group -->
                    <div class="otp-group flex justify-between">
                        <input type="text" maxlength="1" class="otp-input" autoFocus>
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                    </div>

                    <button class="create-btn" onclick="location.href='../DashBoard/index.html'">Verify Code</button>

                    <div class="resend-container">
                        <span>Didn't receive the code?</span>
                        <a href="#" class="resend-link">Resend OTP</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
