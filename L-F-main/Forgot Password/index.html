<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PRODASH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="window flex">
        <!-- SIDEBAR -->
        <aside class="sidebar color3 white-text flex-column">
            <div class="padding">
                <div class="logo">Lost & Found</div>
                <nav class="nav-menu flex-column gap-15">
                    <div class="nav-item">Dashboard</div>
                    <div class="nav-item">Register</div>
                    <div class="nav-item active">Recovery</div>
                </nav>
            </div>
        </aside>

        <!-- MAIN BODY -->
        <main class="main-body color2 flex center">
            <!-- FORGOT PASSWORD PORTRAIT CONTAINER -->
            <div class="portrait-container">
                <h1 class="form-title">Forgot Password</h1>
                
                <div class="form-card color1 border-radius shadow">
                    <p class="instruction-text">Enter your email address and we'll send you a link to reset your password.</p>
                    
                    <!-- Recovery Input -->
                    <div class="input-block">
                        <label>Email Address</label>
                        <input type="email" placeholder="example@mail.com" class="white-input">
                    </div>

                    <!-- Action Button -->
                    <button class="create-btn" onclick="location.href='../OTP Verification/index.html'">Send Recovery Link</button>

                    <!-- Back to Login Link -->
                    <a href="../Login/index.html" class="back-link">Back to Login</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
