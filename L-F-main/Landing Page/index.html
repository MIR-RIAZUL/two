<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

<body>

    <!-- Animated Background Blobs -->
    <div class="color-blob blob-1"></div>

    <div class="color-blob blob-3"></div>

            <!-- Icon inspired by Landing Page.png -->

        </div>

        <div class="cta-group">
            <button class="btn btn-gradient" onclick="location.href='../Login/index.html'">
                Get Started
