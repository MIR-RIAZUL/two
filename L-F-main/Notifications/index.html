<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Lost & Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../flow.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="../index.html"><i class="fa-solid fa-location-crosshairs"></i> Lost & Found</a>
      <nav class="nav-list">
        <a href="../DashBoard/index.html">Dashboard</a>
        <a href="../Browse Listings/index.html">Browse Listings</a>
        <a href="../Chat/index.html">Chat</a>
        <a class="active" href="../Notifications/index.html">Notifications</a>
        <a href="../Profile Page/index.html">Profile</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topline">
        <div>
          <p class="eyebrow">Notifications</p>
          <h1>Latest updates</h1>
        </div>
      </header>

      <section class="list">
        <article class="card">
          <div class="meta"><span class="pill found">Match</span></div>
          <h2>Possible match found</h2>
          <p>A found phone looks similar to your lost item report.</p>
          <a class="btn primary" href="../Post Details/index.html">Item Details</a>
        </article>
        <article class="card">
          <div class="meta"><span class="pill">Message</span></div>
          <h2>New chat message</h2>
          <p>The finder replied to your claim conversation.</p>
          <a class="btn primary" href="../Chat/index.html">Open Chat</a>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
